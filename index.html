<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>佛法足跡</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink:       #1a1612;
  --ink-light: #3d342a;
  --ink-faint: #6b5d50;
  --rice:      #f4efe6;
  --rice-warm: #ece4d2;
  --rice-deep: #e5dcc8;
  --gold:      #b8952a;
  --gold-lt:   #d4ac3a;
  --gold-pale: rgba(184,149,42,0.12);
  --verm:      #9b3a2a;
  --mist:      rgba(244,239,230,0.90);
  --shadow:    rgba(26,22,18,0.09);
  --border:    rgba(184,149,42,0.18);
}
*{margin:0;padding:0;box-sizing:border-box;}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--rice)}
::-webkit-scrollbar-thumb{background:rgba(184,149,42,0.3);border-radius:3px}

body {
  background:var(--rice); color:var(--ink); font-family:'Noto Serif TC',serif; min-height:100vh;
}
body::before {
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 90% 50% at 10% 15%, rgba(175,160,130,0.16) 0%,transparent 65%),
    radial-gradient(ellipse 60% 70% at 90% 80%, rgba(155,140,110,0.13) 0%,transparent 65%);
  pointer-events:none;z-index:0;
}

/* ── HEADER ── */
.site-header {
  position:sticky;top:0;z-index:100;
  background:rgba(244,239,230,0.94); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border); padding:0 48px;
  display:flex;align-items:center;justify-content:space-between; height:64px;
}
.site-logo { display:flex;align-items:baseline;gap:12px; }
.site-logo-main { font-family:'Noto Serif TC',serif;font-size:18px;font-weight:500;color:var(--ink);letter-spacing:4px; }
.site-logo-sub { font-family:'Cinzel',serif;font-size:9px;letter-spacing:5px;color:var(--gold); }
.site-version {
  display:inline-flex;align-items:center; padding:3px 8px;
  font-family:'Cinzel',serif; font-size:10px; letter-spacing:2px;
  color:var(--gold); background:rgba(184,149,42,0.08);
  border:1px solid rgba(184,149,42,0.26); border-radius:999px;
}
.site-nav { display:flex;align-items:center;gap:8px; }
.nav-btn {
  padding:8px 20px; font-family:'Noto Sans TC',sans-serif;font-size:11px;letter-spacing:3px;
  color:var(--ink-faint);background:none;border:none;cursor:pointer;
  position:relative;transition:color 0.2s;
}
.nav-btn::after {
  content:'';position:absolute;bottom:0;left:20px;right:20px;
  height:1.5px;background:var(--gold);
  transform:scaleX(0);transition:transform 0.25s;
}
.nav-btn:hover{color:var(--gold);}
.nav-btn.active{color:var(--gold);}
.nav-btn.active::after{transform:scaleX(1);}

.admin-nav-btn {
  padding:6px 16px; font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:2px;
  color:var(--ink-faint); background:none; border:1px solid rgba(107,93,80,0.25);
  border-radius:1px;cursor:pointer;transition:all 0.2s; margin-left:8px;
}
.admin-nav-btn:hover{color:var(--gold);border-color:var(--gold);}
.admin-nav-btn.logged-in{color:var(--gold);border-color:var(--gold);background:var(--gold-pale);}

/* ── PAGE ── */
.page{display:none;position:relative;z-index:1;}
.page.active{display:block;}

.page-hero { text-align:center;padding:56px 32px 40px; animation:fadeDown 0.7s ease forwards; }
.page-hero-en { font-family:'Cinzel',serif;font-size:10px;letter-spacing:8px;color:var(--gold);margin-bottom:10px; }
.page-hero-title { font-size:26px;font-weight:300;letter-spacing:8px;color:var(--ink);margin-bottom:8px; }
.page-hero-desc { font-family:'Noto Sans TC',sans-serif;font-size:12px;letter-spacing:2px;color:var(--ink-faint); }
.ornament { display:flex;align-items:center;gap:14px;justify-content:center;margin:18px 0 0; }
.ornament::before,.ornament::after { content:'';height:1px;width:60px;background:linear-gradient(to right,transparent,var(--gold)); }
.ornament::after { background:linear-gradient(to left,transparent,var(--gold)); }
.ornament span { font-size:15px;color:var(--gold); }

.content-wrap { max-width:860px;margin:0 auto;padding:0 32px 80px; }

/* ── CARD ── */
.card {
  background:var(--mist);border:1px solid var(--border);border-radius:2px;
  box-shadow:0 3px 20px var(--shadow),inset 0 1px 0 rgba(255,255,255,0.5);
  animation:fadeUp 0.6s ease forwards;opacity:0;
}
.card-header { display:flex;align-items:center;gap:12px;padding:16px 26px 13px;border-bottom:1px solid rgba(184,149,42,0.1); }
.card-label { font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:4px;color:var(--gold); }
.card-body { padding:26px 30px; }

/* ── BUTTONS ── */
.btn-primary {
  display:inline-flex;align-items:center;gap:8px;padding:9px 22px; background:var(--gold);color:var(--rice);
  font-family:'Noto Sans TC',sans-serif;font-size:11px;letter-spacing:3px; border:none;cursor:pointer;border-radius:1px;transition:all 0.22s;
}
.btn-primary:hover{background:var(--gold-lt);}
.btn-outline {
  display:inline-flex;align-items:center;gap:8px;padding:8px 20px;
  background:transparent;color:var(--gold);border:1px solid var(--gold);
  font-family:'Noto Sans TC',sans-serif;font-size:11px;letter-spacing:3px; cursor:pointer;border-radius:1px;transition:all 0.22s;
}
.btn-outline:hover{background:var(--gold);color:var(--rice);}
.btn-sm{padding:5px 14px;font-size:10px;letter-spacing:2px;}
.btn-danger{border-color:var(--verm);color:var(--verm);}
.btn-danger:hover{background:var(--verm);color:var(--rice);}

/* ── DHARMA ── */
.dharma-tabs { display:flex;gap:0;margin-bottom:28px;border-bottom:1px solid var(--border); }
.dharma-tab {
  padding:10px 26px;font-family:'Noto Sans TC',sans-serif;font-size:11px;letter-spacing:3px;color:var(--ink-faint);
  background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.22s;
}
.dharma-tab:hover{color:var(--gold);}
.dharma-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.dharma-source { font-family:'Noto Sans TC',sans-serif;font-size:11px;letter-spacing:2px;color:var(--gold);margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap; }
.dharma-link { display:inline-flex;align-items:center;gap:4px;color:var(--gold);text-decoration:none;font-size:10px;letter-spacing:2px;border:1px solid rgba(184,149,42,0.38);padding:3px 10px;border-radius:1px;transition:all 0.2s; }
.dharma-link:hover{background:var(--gold);color:var(--rice);}
.dharma-text { font-size:22px;line-height:2.5;letter-spacing:0.08em;color:var(--ink);border-left:3px solid var(--gold);padding-left:22px;margin-bottom:24px; }
.dharma-reflection { font-family:'Noto Sans TC',sans-serif;font-size:13px;line-height:2.1;color:var(--ink-faint);padding:18px 22px;background:var(--gold-pale);border-radius:1px; }
.dharma-reflection strong { display:block;font-size:10px;letter-spacing:2px;color:var(--ink-light);margin-bottom:8px; }
.more-links { margin-top:16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center; }
.more-link { display:inline-flex;align-items:center;gap:4px;color:var(--ink-faint);text-decoration:none;font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:1px;border:1px solid rgba(107,93,80,0.2);padding:4px 11px;border-radius:1px;transition:all 0.2s; }
.more-link:hover{color:var(--ink);border-color:var(--gold);background:var(--gold-pale);}
.btn-essay { display:inline-flex;align-items:center;gap:4px;font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:1px;color:var(--ink-faint);background:none;border:1px solid rgba(107,93,80,0.2);padding:4px 11px;border-radius:1px;cursor:pointer;transition:all 0.2s; }
.btn-essay:hover{color:var(--ink);border-color:var(--gold);background:var(--gold-pale);}
.btn-essay.linked{color:#4f8c6b;border-color:rgba(79,140,107,0.4);background:rgba(79,140,107,0.05);}
.btn-essay.linked:hover{background:rgba(79,140,107,0.1);}
.btn-lang { margin-left:auto;padding:5px 16px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;color:var(--gold);background:transparent;border:1px solid rgba(184,149,42,0.35);border-radius:1px;cursor:pointer;transition:all 0.2s; }
.btn-lang:hover{background:var(--gold-pale);border-color:var(--gold);}
.btn-lang.en-mode{background:var(--gold-pale);border-color:var(--gold);color:var(--ink-light);}

/* ── LISTS & DETAIL ── */
.history-empty { text-align:center;padding:44px 20px;font-family:'Noto Sans TC',sans-serif;font-size:13px;color:var(--ink-faint);line-height:2; }
.history-item { display:grid;grid-template-columns:130px 1fr 20px;align-items:start;gap:16px;padding:16px 0;border-bottom:1px solid rgba(184,149,42,0.09);cursor:pointer;transition:all 0.18s; }
.history-item:last-child{border-bottom:none;}
.history-item:hover{background:var(--gold-pale);margin:0 -30px;padding-left:30px;padding-right:30px;}
.history-date { font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:2px;color:var(--ink-faint);padding-top:3px;white-space:nowrap; }
.today-badge { display:inline-block;font-size:9px;letter-spacing:1px;background:var(--gold);color:var(--rice);padding:1px 7px;border-radius:1px;margin-left:5px; }
.history-source { font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:1px;color:var(--gold);margin-bottom:5px; }
.history-quote { font-size:15px;line-height:1.9;color:var(--ink-light);letter-spacing:0.04em; }
.history-arrow { color:rgba(184,149,42,0.35);font-size:14px;align-self:center; }
.history-item:hover .history-arrow{color:var(--gold);}
.detail-back { display:inline-flex;align-items:center;gap:8px;font-family:'Noto Sans TC',sans-serif;font-size:11px;letter-spacing:2px;color:var(--ink-faint);cursor:pointer;margin-bottom:22px;padding:6px 0;border:none;background:none;transition:color 0.2s; }
.detail-back:hover{color:var(--gold);}
.detail-date-label { font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:3px;color:var(--ink-faint);margin-bottom:18px; }

.essay-card { background:var(--mist);border:1px solid var(--border);border-radius:2px;padding:24px 28px;box-shadow:0 2px 14px var(--shadow);cursor:pointer;transition:all 0.22s;margin-bottom:16px; }
.essay-card:hover { border-color:rgba(184,149,42,0.4);box-shadow:0 4px 24px rgba(26,22,18,0.13);transform:translateY(-1px); }
.essay-card-meta { display:flex;align-items:center;gap:14px;margin-bottom:10px; }
.essay-date { font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:3px;color:var(--gold); }
.essay-tag { font-family:'Noto Sans TC',sans-serif;font-size:9px;letter-spacing:2px;background:var(--gold-pale);color:var(--gold);padding:2px 9px;border-radius:1px; }
.essay-title { font-size:17px;font-weight:500;letter-spacing:2px;color:var(--ink);margin-bottom:10px;line-height:1.7; }
.essay-excerpt { font-family:'Noto Sans TC',sans-serif;font-size:12px;line-height:2;color:var(--ink-faint);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden; }
.essay-card-footer { display:flex;justify-content:space-between;align-items:center;margin-top:14px; }
.essay-read-more { font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:2px;color:var(--gold); }

/* ── DETAIL PAGES ── */
.essay-detail-date { font-family:'Noto Sans TC',sans-serif; font-size:11px; letter-spacing:3px; color:var(--gold); margin-bottom:12px; }
.essay-detail-title { font-size:24px; font-weight:400; letter-spacing:4px; color:var(--ink); margin-bottom:8px; line-height:1.7; }
.essay-detail-divider { height:1px; background:linear-gradient(to right,var(--gold),transparent); margin:20px 0; width:120px; }
.essay-detail-body { font-family:'Noto Serif TC',serif; font-size:16px; line-height:2.4; color:var(--ink-light); white-space:pre-wrap; text-align:justify; }

/* ── MODAL ── */
.modal-overlay { display:none;position:fixed;inset:0;background:rgba(26,22,18,0.55);z-index:200;align-items:center;justify-content:center;padding:24px; }
.modal-overlay.open{display:flex;}
.modal { background:var(--rice);border:1px solid var(--border);border-radius:2px;width:100%;max-width:720px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(26,22,18,0.3); }
.modal-header { display:flex;align-items:center;justify-content:space-between;padding:20px 28px;border-bottom:1px solid var(--border); }
.modal-title { font-family:'Noto Sans TC',sans-serif;font-size:11px;letter-spacing:4px;color:var(--gold); }
.modal-close { background:none;border:none;cursor:pointer;font-size:18px;color:var(--ink-faint); }
.modal-body { padding:28px; }
.modal-footer { display:flex;justify-content:flex-end;gap:12px;padding:16px 28px 24px; }
.form-group { margin-bottom:20px; }
.form-label { display:block;font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:3px;color:var(--gold);margin-bottom:8px; }
.form-input, .form-textarea { width:100%;padding:10px 14px;background:rgba(255,255,255,0.6);border:1px solid var(--border);border-radius:1px;font-family:'Noto Serif TC',serif;color:var(--ink);outline:none; }
.form-textarea { min-height:280px;line-height:2; }

/* ── GALLERY ── */
.gallery-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:16px; }
.gallery-item { background:var(--mist);border:1px solid var(--border);border-radius:2px;overflow:hidden;cursor:pointer;transition:all 0.25s;box-shadow:0 2px 12px var(--shadow); }
.gallery-img-wrap { width:100%;aspect-ratio:4/3;overflow:hidden; }
.gallery-img-wrap img { width:100%;height:100%;object-fit:cover; }
.gallery-info { padding:14px 16px; }
.gallery-item-title { font-size:13px;font-weight:500;letter-spacing:2px;color:var(--ink);margin-bottom:5px; }

/* ── LIGHTBOX ── */
.lightbox { display:none;position:fixed;inset:0;background:rgba(15,12,10,0.88);z-index:300;align-items:center;justify-content:center;padding:24px;flex-direction:column; }
.lightbox.open{display:flex;}
.lightbox img{max-width:100%;max-height:70vh;object-fit:contain;border:1px solid var(--border);}
.lightbox-close{position:absolute;top:24px;right:28px;background:none;border:none;cursor:pointer;color:rgba(244,239,230,0.5);font-size:24px;}

/* ── ESSAY VIEW MODAL ── */
.essay-view-body { font-family:'Noto Serif TC',serif;font-size:15px;line-height:2;color:var(--ink-light);white-space:pre-wrap;padding:16px 0; }
.btn-unlink { font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:1px;color:var(--verm);background:none;border:1px solid rgba(155,58,42,0.3);border-radius:1px;padding:4px 12px;cursor:pointer;margin-bottom:16px; }

.loading-spinner { text-align:center;padding:48px;font-family:'Noto Sans TC',sans-serif;font-size:12px;letter-spacing:2px;color:var(--ink-faint); }
.spinner { width:24px;height:24px;border:2px solid rgba(184,149,42,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px; }

.site-footer { text-align:center;padding:32px;font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:3px;color:var(--ink-faint);opacity:0.45;border-top:1px solid var(--border);margin-top:40px; }

@keyframes fadeDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:700px){
  /* ── HEADER: wrap to logo row + scrollable nav row ── */
  .site-header{
    padding:0 16px; height:auto; flex-wrap:wrap; gap:0;
  }
  .site-logo{ padding:10px 0; flex-shrink:0; }
  .site-logo-sub{ display:none; }
  .site-version{ font-size:9px; padding:2px 7px; }
  .site-nav{
    width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch;
    padding:0 0 6px; border-top:1px solid rgba(184,149,42,0.12);
    gap:0; margin:0 -16px; padding-left:16px;
  }
  .nav-btn{ padding:10px 14px; font-size:10px; letter-spacing:1px; white-space:nowrap; flex-shrink:0; }
  .nav-btn::after{ left:14px; right:14px; }
  .admin-nav-btn{ padding:5px 10px; font-size:9px; letter-spacing:1px; margin-left:4px; flex-shrink:0; white-space:nowrap; }

  /* ── PAGE HERO ── */
  .page-hero{ padding:28px 16px 18px; }
  .page-hero-title{ font-size:20px; letter-spacing:4px; }
  .page-hero-en{ letter-spacing:4px; }
  .ornament::before,.ornament::after{ width:36px; }

  /* ── CONTENT & CARDS ── */
  .content-wrap{ padding:0 12px 48px; }
  .card-header{ padding:12px 14px 10px; }
  .card-body{ padding:14px 14px; }

  /* ── DHARMA ── */
  .dharma-tabs{
    overflow-x:auto; -webkit-overflow-scrolling:touch; flex-wrap:nowrap;
    margin:0 -12px; padding:0 12px;
  }
  .dharma-tab{ padding:10px 16px; font-size:10px; letter-spacing:1px; white-space:nowrap; flex-shrink:0; }
  .dharma-text{ font-size:17px; line-height:2.2; padding-left:14px; }
  .dharma-reflection{ font-size:12px; padding:12px 14px; }
  .dharma-source{ font-size:10px; }

  /* ── HISTORY LIST (mobile: date stacks above source) ── */
  .history-item{
    grid-template-columns:1fr 16px;
    grid-template-areas:"date arrow" "content arrow";
    gap:4px 10px;
    padding:14px 0;
  }
  .history-item > :nth-child(1){ grid-area:date; }
  .history-item > :nth-child(2){ grid-area:content; min-width:0; }
  .history-item > :nth-child(3){ grid-area:arrow; align-self:center; }
  .history-date{ font-size:10px; letter-spacing:1.5px; padding-top:0; }
  .history-source{ font-size:11px; margin-bottom:6px; }
  .history-quote{ font-size:14px; line-height:1.85; word-break:break-word; }
  .history-item:hover{ margin:0 -12px; padding-left:12px; padding-right:12px; }

  /* ── ESSAYS ── */
  .essay-card{ padding:14px 16px; }
  .essay-title{ font-size:15px; letter-spacing:1px; }
  .essay-detail-title{ font-size:18px; letter-spacing:2px; }
  .essay-detail-body{ font-size:14px; line-height:2.2; }

  /* ── GALLERY ── */
  .gallery-grid{ grid-template-columns:repeat(2,1fr); gap:10px; }

  /* ── MODAL ── */
  .modal-overlay{ padding:10px; }
  .modal-header{ padding:14px 16px; }
  .modal-body{ padding:16px; }
  .modal-footer{ padding:12px 16px 18px; gap:8px; }
  .form-textarea{ min-height:200px; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="site-logo">
    <span class="site-logo-main"><span style="color:var(--gold)">佛法</span><span style="color:#4f8c6b">足跡</span></span>
    <span class="site-logo-sub">Buddhist Footprints</span>
    <span class="site-version" id="versionBadge">v2.11</span>
  </div>
  <nav class="site-nav">
    <button class="nav-btn active" onclick="showPage('dharma',this)">每日佛典</button>
    <button class="nav-btn" onclick="showPage('essays',this)">佛法心得</button>
    <button class="nav-btn" onclick="showPage('mantras',this)">佛咒</button>
    <button class="nav-btn" onclick="showPage('gallery',this)">佛法圖集</button>
    <button class="admin-nav-btn" id="adminNavBtn" onclick="handleAdminClick()">管理員</button>
  </nav>
</header>

<div class="page active" id="page-dharma">
  <div class="page-hero">
    <div class="page-hero-en">DAILY DHARMA</div>
    <div class="page-hero-title">每日佛典</div>
    <div class="ornament"><span>☸</span></div>
  </div>
  <div class="content-wrap">
    <div class="dharma-tabs">
      <button class="dharma-tab active" id="dtab-today" onclick="switchDharmaTab('today')">今日主題</button>
      <button class="dharma-tab" id="dtab-history" onclick="switchDharmaTab('history')">過往主題</button>
      <button class="dharma-tab" id="dtab-en-history" onclick="switchDharmaTab('en-history')">Previous Dharma</button>
    </div>
    <div class="card" id="dharma-today-card">
      <div class="card-header"><span style="font-size:19px">🪷</span><div class="card-label">TODAY · 今日佛典</div><button class="btn-lang" id="langToggleBtn" onclick="toggleDharmaLang()">EN</button></div>
      <div class="card-body" id="dharmaBody"></div>
    </div>
    <div id="dharma-history-wrap" style="display:none">
      <div class="card"><div class="card-header"><span style="font-size:19px">📜</span><div class="card-label">ARCHIVE · 過往主題</div></div><div class="card-body" id="historyBody"></div></div>
    </div>
    <div id="dharma-en-history-wrap" style="display:none">
      <div class="card"><div class="card-header"><span style="font-size:19px">📜</span><div class="card-label" style="font-family:'Cinzel',serif;letter-spacing:3px">PREVIOUS DHARMA</div></div><div class="card-body" id="enHistoryBody"></div></div>
    </div>
  </div>
</div>

<div class="page" id="page-essays"><div class="content-wrap" id="essayContent"></div></div>
<div class="page" id="page-mantras"><div class="content-wrap" id="mantraContent"></div></div>
<div class="page" id="page-gallery"><div class="content-wrap" id="galleryContent"></div></div>

<div class="modal-overlay" id="loginModal">
  <div class="modal" style="max-width:400px">
    <div class="modal-header"><div class="modal-title">管理員登入</div><button class="modal-close" onclick="closeModal('loginModal')">✕</button></div>
    <div class="modal-body"><input class="form-input" id="adminPassword" type="password" placeholder="輸入密碼…" onkeydown="if(event.key==='Enter')doLogin()"><div id="loginError" style="color:var(--verm);font-size:12px;margin-top:10px;display:none">密碼錯誤</div></div>
    <div class="modal-footer"><button class="btn-primary" onclick="doLogin()">登入</button></div>
  </div>
</div>

<div class="modal-overlay" id="essayModal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title" id="essayModalTitle">編輯內容</div><button class="modal-close" onclick="closeModal('essayModal')">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="essayEditId"><input type="hidden" id="essayDharmaSource">
      <div class="form-group"><label class="form-label">標題</label><input class="form-input" id="essayTitleInput"></div>
      <div class="form-group"><label class="form-label">標籤</label><input class="form-input" id="essayTagInput"></div>
      <div class="form-group"><label class="form-label">內文</label><textarea class="form-textarea" id="essayContentInput"></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn-primary" onclick="saveEssay()">儲存</button></div>
  </div>
</div>

<div class="modal-overlay" id="galleryModal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">上傳圖片</div><button class="modal-close" onclick="closeModal('galleryModal')">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="galleryEditId"><img id="galleryPreviewImg" style="width:100%;max-height:200px;object-fit:contain;display:none;margin-bottom:15px">
      <input type="file" id="galleryFileInput" accept="image/*" onchange="handleImageSelect(event)">
      <div class="form-group" style="margin-top:15px"><label class="form-label">標題</label><input class="form-input" id="galleryTitleInput"></div>
      <div class="form-group"><label class="form-label">說明</label><input class="form-input" id="galleryCaptionInput"></div>
    </div>
    <div class="modal-footer"><button class="btn-primary" onclick="saveGalleryItem()">儲存</button></div>
  </div>
</div>

<div class="modal-overlay" id="essayViewModal">
  <div class="modal" style="max-width:560px">
    <div class="modal-header"><div class="modal-title" id="essayViewTitle"></div><button class="modal-close" onclick="closeModal('essayViewModal')">✕</button></div>
    <div class="modal-body"><div id="essayViewMeta"></div><div class="essay-view-body" id="essayViewContent"></div><div id="essayViewUnlink" style="display:none;margin-top:15px"><button class="btn-unlink" onclick="unlinkEssayFromDharma()">✕ 移除連結</button></div></div>
  </div>
</div>

<div class="lightbox" id="lightbox"><button class="lightbox-close" onclick="closeLightbox()">✕</button><img id="lightboxImg"></div>

<script>
const ADMIN_TOKEN_KEY = 'bf_admin_token';
let isAdmin = Boolean(sessionStorage.getItem(ADMIN_TOKEN_KEY));
let _dharmaEnMode = false;
let _todayDharma = null;
let _essayModalId = null;

async function apiGet(path) { const r = await fetch(path); return r.ok ? r.json() : null; }
async function apiPost(path, body) { const r = await fetch(path, { method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+sessionStorage.getItem(ADMIN_TOKEN_KEY)}, body:JSON.stringify(body) }); return {ok:r.ok, data:await r.json()}; }
async function apiPut(path, body) { const r = await fetch(path, { method:'PUT', headers:{'Content-Type':'application/json','Authorization':'Bearer '+sessionStorage.getItem(ADMIN_TOKEN_KEY)}, body:JSON.stringify(body) }); return {ok:r.ok, data:await r.json()}; }
async function apiDelete(path) { const r = await fetch(path, { method:'DELETE', headers:{'Authorization':'Bearer '+sessionStorage.getItem(ADMIN_TOKEN_KEY)} }); return r.ok; }

function applyAdminState() {
  const btn = document.getElementById('adminNavBtn'); if(btn){ btn.textContent = isAdmin?'登出':'管理員'; btn.classList.toggle('logged-in', isAdmin); }
}
function handleAdminClick() { if(isAdmin){ isAdmin=false; sessionStorage.removeItem(ADMIN_TOKEN_KEY); applyAdminState(); location.reload(); } else { openModal('loginModal'); } }
async function doLogin() {
  const res = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:document.getElementById('adminPassword').value}) });
  if(res.ok){ const data = await res.json(); isAdmin=true; sessionStorage.setItem(ADMIN_TOKEN_KEY, data.token); location.reload(); }
  else { document.getElementById('loginError').style.display='block'; }
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function todayKey() { return new Date().toLocaleDateString('sv-SE', {timeZone:'Asia/Kuala_Lumpur'}); }

function parseDate(dateStr) {
  if (!dateStr) return null;
  const cleanStr = dateStr.replace(' ', 'T');
  const d = new Date(cleanStr);
  if (isNaN(d.getTime())) {
    const [y, m, day] = dateStr.split('-').map(Number);
    return new Date(y, m - 1, day);
  }
  return d;
}

function formatDate(iso) {
  const d = parseDate(iso); if (!d) return '日期不詳';
  return d.toLocaleDateString('zh-Hant-TW', {year:'numeric',month:'long',day:'numeric',weekday:'long'});
}
function formatDateEn(iso) {
  const d = parseDate(iso); if (!d) return 'Unknown Date';
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

async function fetchTodayDharma() { _todayDharma = await apiGet('/api/dharma/history/' + todayKey()); renderTodayDharma(); }

function renderDharmaEntry(zh, en, dateLbl, mode) {
  const alts = (zh.alt_links ? JSON.parse(zh.alt_links) : []).map(l => `<a class="more-link" href="${l.url}" target="_blank">↗ ${l.label}</a>`).join('');
  if (mode === 'en') {
    return `${dateLbl ? `<div class="detail-date-label">${dateLbl}</div>` : ''}
      <div class="dharma-source" style="flex-direction:column;gap:6px"><span style="font-family:'Noto Sans TC',sans-serif;font-size:10px;color:var(--ink-faint)">${zh.source}</span><span>${en ? en.source_en : zh.source}</span></div>
      <div class="dharma-text" style="font-size:18px">${en ? en.text_en : zh.text}</div>
      <div class="dharma-reflection"><strong>REFLECTION</strong>${en ? en.reflection_en : 'Translation pending.'}</div>
      <div class="more-links"><button class="btn-essay" onclick="handleEssayClick('${escAttr(zh.source)}',this)">心得</button></div>`;
  } else {
    return `${dateLbl ? `<div class="detail-date-label">${dateLbl}</div>` : ''}
      <div class="dharma-source"><span>出處：${zh.source}</span>${zh.cbeta_url ? `<a class="dharma-link" href="${zh.cbeta_url}" target="_blank">☸ ${zh.cbeta_label || 'CBETA'}</a>` : ''}</div>
      <div class="dharma-text">${zh.text}</div>
      ${zh.reflection ? `<div class="dharma-reflection"><strong>今日思索</strong>${zh.reflection}</div>` : ''}
      <div class="more-links">${alts}<button class="btn-essay" onclick="handleEssayClick('${escAttr(zh.source)}',this)">心得</button></div>`;
  }
}

async function handleEssayClick(source, btn) {
  btn.disabled = true; const essays = await apiGet('/api/essays?dharma_source=' + encodeURIComponent(source)); btn.disabled = false;
  if (essays && essays.length) { showEssayModal(essays[0]); } else if (isAdmin) { openEssayEditor(null, source); }
}
function showEssayModal(essay) {
  document.getElementById('essayViewTitle').textContent = essay.title;
  document.getElementById('essayViewContent').textContent = essay.content;
  document.getElementById('essayViewMeta').innerHTML = `<span style="font-size:11px;color:var(--ink-faint)">${formatDate(essay.created_at)}</span>`;
  document.getElementById('essayViewUnlink').style.display = isAdmin ? 'block' : 'none';
  _essayModalId = essay.id; openModal('essayViewModal');
}
async function unlinkEssayFromDharma() { if(confirm('移除連結？')){ await apiPut('/api/essays/'+_essayModalId, {dharma_source:null}); closeModal('essayViewModal'); } }

async function renderTodayDharma() {
  if(!_todayDharma) return;
  const btn = document.getElementById('langToggleBtn'); const body = document.getElementById('dharmaBody');
  if(!_dharmaEnMode){ btn.textContent='EN'; btn.classList.remove('en-mode'); body.innerHTML = renderDharmaEntry(_todayDharma, null, null, 'zh'); }
  else { btn.textContent='中'; btn.classList.add('en-mode'); const enArr = await apiGet('/api/dharma/en?source=' + encodeURIComponent(_todayDharma.source)); body.innerHTML = renderDharmaEntry(_todayDharma, enArr?.[0], null, 'en'); }
}
function toggleDharmaLang() { _dharmaEnMode = !_dharmaEnMode; renderTodayDharma(); }

function switchDharmaTab(tab) {
  ['dtab-today','dtab-history','dtab-en-history'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById('dtab-'+tab).classList.add('active');
  document.getElementById('dharma-today-card').style.display = tab==='today'?'block':'none';
  document.getElementById('dharma-history-wrap').style.display = tab==='history'?'block':'none';
  document.getElementById('dharma-en-history-wrap').style.display = tab==='en-history'?'block':'none';
  if(tab==='today') renderTodayDharma(); else if(tab==='history') renderDharmaHistory(); else renderDharmaEnHistory();
}

async function renderDharmaHistory() {
  const rows = await apiGet('/api/dharma/history'); const body = document.getElementById('historyBody');
  if(!rows || !rows.length){ body.innerHTML='尚無紀錄'; return; }
  const tk = todayKey();
  body.innerHTML = rows.map(e => `<div class="history-item" onclick="showDharmaDetail('${e.date}')"><div class="history-date">${formatDate(e.date)}${e.date===tk?'<span class="today-badge">今日</span>':''}</div><div><div class="history-source">${e.source}</div><div class="history-quote">${e.text}</div></div><div class="history-arrow">›</div></div>`).join('');
}
async function showDharmaDetail(iso) { const zh = await apiGet('/api/dharma/history/'+iso); document.getElementById('historyBody').innerHTML = `<button class="detail-back" onclick="renderDharmaHistory()">‹ 返回</button>${renderDharmaEntry(zh, null, formatDate(iso), 'zh')}`; }

async function renderDharmaEnHistory() {
  const [rows, enRows] = await Promise.all([apiGet('/api/dharma/history'), apiGet('/api/dharma/en')]);
  const enMap = {}; if(enRows) enRows.forEach(e => enMap[e.source]=e);
  const body = document.getElementById('enHistoryBody'); const tk = todayKey();
  body.innerHTML = rows.map(e => { const en = enMap[e.source]; return `<div class="history-item" onclick="showDharmaEnDetail('${e.date}')"><div class="history-date">${formatDateEn(e.date)}${e.date===tk?'<span class="today-badge">Today</span>':''}</div><div><div class="history-source">${en?en.source_en:e.source}</div><div class="history-quote">${en?en.text_en:e.text}</div></div><div class="history-arrow">›</div></div>`; }).join('');
}
async function showDharmaEnDetail(iso) { const zh = await apiGet('/api/dharma/history/'+iso); const enArr = await apiGet('/api/dharma/en?source='+encodeURIComponent(zh.source)); document.getElementById('enHistoryBody').innerHTML = `<button class="detail-back" onclick="renderDharmaEnHistory()">‹ Back</button>${renderDharmaEntry(zh, enArr?.[0], formatDateEn(iso), 'en')}`; }

async function renderEssayList() {
  const essays = await apiGet('/api/essays'); const wrap = document.getElementById('essayContent');
  wrap.innerHTML = (isAdmin?`<div class="section-toolbar"><button class="btn-primary" onclick="openEssayEditor()">＋ 新增心得</button></div>`:'') + 
    `<div class="essay-list">${(essays||[]).map(e => `<div class="essay-card" onclick="showEssayPageDetail('${e.id}')"><div class="essay-card-meta"><span class="essay-date">${formatDate(e.created_at)}</span>${e.tag?`<span class="essay-tag">${e.tag}</span>`:''}</div><div class="essay-title">${e.title}</div><div class="essay-excerpt">${e.content.slice(0,120)}…</div></div>`).join('')}</div>`;
}
async function showEssayPageDetail(id) {
  const e = await apiGet('/api/essays/'+id); const wrap = document.getElementById('essayContent');
  wrap.innerHTML = `<button class="detail-back" onclick="renderEssayList()">‹ 返回列表</button>
    <div class="card"><div class="card-body">
      <div class="essay-detail-date">${formatDate(e.created_at)}</div>
      <div class="essay-detail-title">${e.title}</div>
      <div class="essay-detail-divider"></div>
      <div class="essay-detail-body">${escHtml(e.content)}</div>
      ${isAdmin?`<div style="margin-top:20px"><button class="btn-outline btn-sm" onclick="editEssay('${e.id}')">編輯</button><button class="btn-outline btn-sm btn-danger" onclick="deleteEssay('${e.id}')">刪除</button></div>`:''}
    </div></div>`;
}
function openEssayEditor(e, ds) { document.getElementById('essayEditId').value=e?e.id:''; document.getElementById('essayDharmaSource').value=ds||''; document.getElementById('essayTitleInput').value=e?e.title:''; document.getElementById('essayContentInput').value=e?e.content:''; document.getElementById('essayTagInput').value=e?e.tag:''; openModal('essayModal'); }
async function saveEssay() { const id=document.getElementById('essayEditId').value; const body={title:document.getElementById('essayTitleInput').value, content:document.getElementById('essayContentInput').value, dharma_source:document.getElementById('essayDharmaSource').value, tag:document.getElementById('essayTagInput').value}; const r=id?await apiPut('/api/essays/'+id, body):await apiPost('/api/essays', body); if(r.ok){ closeModal('essayModal'); renderEssayList(); } }
async function editEssay(id) { const e=await apiGet('/api/essays/'+id); openEssayEditor(e); }
async function deleteEssay(id) { if(confirm('刪除？')){ await apiDelete('/api/essays/'+id); renderEssayList(); } }

async function renderMantraList() {
  const mantras = await apiGet('/api/mantras'); const wrap = document.getElementById('mantraContent');
  wrap.innerHTML = (isAdmin?`<div class="section-toolbar"><button class="btn-primary" onclick="openMantraEditor()">＋ 新增佛咒</button></div>`:'') + 
    `<div class="essay-list">${(mantras||[]).map(e => `<div class="essay-card" onclick="showMantraPageDetail('${e.id}')"><div class="essay-title">${e.title}</div><div class="essay-excerpt">${e.content.slice(0,100)}…</div></div>`).join('')}</div>`;
}
async function showMantraPageDetail(id) {
  const e = await apiGet('/api/essays/'+id); const wrap = document.getElementById('mantraContent');
  wrap.innerHTML = `<button class="detail-back" onclick="renderMantraList()">‹ 返回列表</button>
    <div class="card"><div class="card-body">
      <div class="essay-detail-date">${formatDate(e.created_at)}</div>
      <div class="essay-detail-title">${e.title}</div>
      <div class="essay-detail-divider"></div>
      <div class="essay-detail-body">${escHtml(e.content)}</div>
      ${isAdmin?`<div style="margin-top:20px"><button class="btn-outline btn-sm" onclick="editMantra('${e.id}')">編輯</button><button class="btn-outline btn-sm btn-danger" onclick="deleteMantra('${e.id}')">刪除</button></div>`:''}
    </div></div>`;
}
function openMantraEditor(m) { document.getElementById('essayEditId').value=m?m.id:''; document.getElementById('essayTitleInput').value=m?m.title:''; document.getElementById('essayContentInput').value=m?m.content:''; openModal('essayModal'); }
async function editMantra(id) { const e=await apiGet('/api/essays/'+id); openMantraEditor(e); }
async function deleteMantra(id) { if(confirm('確定？')){ await apiDelete('/api/essays/'+id); renderMantraList(); } }

async function renderGallery() {
  const items = await apiGet('/api/gallery'); const wrap = document.getElementById('galleryContent');
  wrap.innerHTML = (isAdmin?`<div class="section-toolbar"><button class="btn-primary" onclick="openGalleryUpload()">＋ 上傳圖片</button></div>`:'') + 
    `<div class="gallery-grid">${(items||[]).map(it => `<div class="gallery-item"><div class="gallery-img-wrap" onclick="openLightbox('','${it.image_url}')"><img src="${it.image_url}"></div><div class="gallery-info"><div>${it.title}</div>${isAdmin?`<button onclick="deleteGalleryItem('${it.id}')">刪除</button>`:''}</div></div>`).join('')}</div>`;
}
function openGalleryUpload() { openModal('galleryModal'); }
function handleImageSelect(e) { const file=e.target.files[0]; const r=new FileReader(); r.onload=ev=>{ pendingImageData=ev.target.result; document.getElementById('galleryPreviewImg').src=pendingImageData; document.getElementById('galleryPreviewImg').style.display='block'; }; r.readAsDataURL(file); }
async function saveGalleryItem() { const r=await apiPost('/api/gallery',{title:document.getElementById('galleryTitleInput').value, caption:document.getElementById('galleryCaptionInput').value, image_url:pendingImageData}); if(r.ok){ closeModal('galleryModal'); renderGallery(); } }
async function deleteGalleryItem(id) { if(confirm('刪除？')){ await apiDelete('/api/gallery/'+id); renderGallery(); } }

function openLightbox(id, src) { document.getElementById('lightboxImg').src=src; document.getElementById('lightbox').classList.add('open'); }
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active'); if(btn) btn.classList.add('active');
  if(name==='essays') renderEssayList(); else if(name==='mantras') renderMantraList(); else if(name==='gallery') renderGallery();
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return (s||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }
document.addEventListener('DOMContentLoaded', () => { applyAdminState(); fetchTodayDharma(); });
document.addEventListener('keydown',e=>{
  if(e.key!=='Escape')return;
  const lb=document.getElementById('lightbox');
  if(lb&&lb.classList.contains('open')){lb.classList.remove('open');return;}
  const om=document.querySelector('.modal-overlay.open');
  if(om){om.classList.remove('open');return;}
  const back=document.querySelector('.detail-back');
  if(back)back.click();
});
</script>
</body>
</html>
