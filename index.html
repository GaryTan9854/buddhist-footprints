<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>佛法足跡</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --ink:       #1a1612;
  --ink-light: #3d342a;
  --ink-faint: #6b5d50;
  --rice:      #f4efe6;
  --rice-warm: #ece4d2;
  --rice-deep: #e5dcc8;
  --gold:      #b8952a;
  --gold-lt:   #d4ac3a;
  --gold-pale: rgba(184,149,42,0.12);
  --verm:      #9b3a2a;
  --mist:      rgba(244,239,230,0.90);
  --shadow:    rgba(26,22,18,0.09);
  --border:    rgba(184,149,42,0.18);
}
*{margin:0;padding:0;box-sizing:border-box;}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--rice)}
::-webkit-scrollbar-thumb{background:rgba(184,149,42,0.3);border-radius:3px}

body {
  background:var(--rice);
  color:var(--ink);
  font-family:'Noto Serif TC',serif;
  min-height:100vh;
}
body::before {
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 90% 50% at 10% 15%, rgba(175,160,130,0.16) 0%,transparent 65%),
    radial-gradient(ellipse 60% 70% at 90% 80%, rgba(155,140,110,0.13) 0%,transparent 65%);
  pointer-events:none;z-index:0;
}

/* ── HEADER ── */
.site-header {
  position:sticky;top:0;z-index:100;
  background:rgba(244,239,230,0.94);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:0 48px;
  display:flex;align-items:center;justify-content:space-between;
  height:64px;
}
.site-logo { display:flex;align-items:baseline;gap:12px; }
.site-logo-main { font-family:'Noto Serif TC',serif;font-size:18px;font-weight:500;color:var(--ink);letter-spacing:4px; }
.site-logo-sub { font-family:'Cinzel',serif;font-size:9px;letter-spacing:5px;color:var(--gold); }
.site-nav { display:flex;align-items:center;gap:8px; }
.nav-btn {
  padding:8px 20px;
  font-family:'Noto Sans TC',sans-serif;font-size:11px;letter-spacing:3px;
  color:var(--ink-faint);background:none;border:none;cursor:pointer;
  position:relative;transition:color 0.2s;
}
.nav-btn::after {
  content:'';position:absolute;bottom:0;left:20px;right:20px;
  height:1.5px;background:var(--gold);
  transform:scaleX(0);transition:transform 0.25s;
}
.nav-btn:hover{color:var(--gold);}
.nav-btn.active{color:var(--gold);}
.nav-btn.active::after{transform:scaleX(1);}

/* Admin button in nav */
.admin-nav-btn {
  padding:6px 16px;
  font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:2px;
  color:var(--ink-faint);
  background:none;
  border:1px solid rgba(107,93,80,0.25);
  border-radius:1px;cursor:pointer;transition:all 0.2s;
  margin-left:8px;
}
.admin-nav-btn:hover{color:var(--gold);border-color:var(--gold);}
.admin-nav-btn.logged-in{color:var(--gold);border-color:var(--gold);background:var(--gold-pale);}

/* ── PAGE ── */
.page{display:none;position:relative;z-index:1;}
.page.active{display:block;}

.page-hero {
  text-align:center;padding:56px 32px 40px;
  animation:fadeDown 0.7s ease forwards;
}
.page-hero-en { font-family:'Cinzel',serif;font-size:10px;letter-spacing:8px;color:var(--gold);margin-bottom:10px; }
.page-hero-title { font-size:26px;font-weight:300;letter-spacing:8px;color:var(--ink);margin-bottom:8px; }
.page-hero-desc { font-family:'Noto Sans TC',sans-serif;font-size:12px;letter-spacing:2px;color:var(--ink-faint); }
.ornament { display:flex;align-items:center;gap:14px;justify-content:center;margin:18px 0 0; }
.ornament::before,.ornament::after { content:'';height:1px;width:60px;background:linear-gradient(to right,transparent,var(--gold)); }
.ornament::after { background:linear-gradient(to left,transparent,var(--gold)); }
.ornament span { font-size:15px;color:var(--gold); }

.content-wrap { max-width:860px;margin:0 auto;padding:0 32px 80px; }

/* ── CARD ── */
.card {
  background:var(--mist);border:1px solid var(--border);border-radius:2px;
  box-shadow:0 3px 20px var(--shadow),inset 0 1px 0 rgba(255,255,255,0.5);
  animation:fadeUp 0.6s ease forwards;opacity:0;
}
.card-header { display:flex;align-items:center;gap:12px;padding:16px 26px 13px;border-bottom:1px solid rgba(184,149,42,0.1); }
.card-label { font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:4px;color:var(--gold); }
.card-body { padding:26px 30px; }

/* ── BUTTONS ── */
.btn-primary {
  display:inline-flex;align-items:center;gap:8px;padding:9px 22px;
  background:var(--gold);color:var(--rice);
  font-family:'Noto Sans TC',sans-serif;font-size:11px;letter-spacing:3px;
  border:none;cursor:pointer;border-radius:1px;transition:all 0.22s;
}
.btn-primary:hover{background:var(--gold-lt);}
.btn-outline {
  display:inline-flex;align-items:center;gap:8px;padding:8px 20px;
  background:transparent;color:var(--gold);border:1px solid var(--gold);
  font-family:'Noto Sans TC',sans-serif;font-size:11px;letter-spacing:3px;
  cursor:pointer;border-radius:1px;transition:all 0.22s;
}
.btn-outline:hover{background:var(--gold);color:var(--rice);}
.btn-sm{padding:5px 14px;font-size:10px;letter-spacing:2px;}
.btn-danger{border-color:var(--verm);color:var(--verm);}
.btn-danger:hover{background:var(--verm);color:var(--rice);}

/* ── DHARMA ── */
.dharma-tabs { display:flex;gap:0;margin-bottom:28px;border-bottom:1px solid var(--border); }
.dharma-tab {
  padding:10px 26px;font-family:'Noto Sans TC',sans-serif;font-size:11px;letter-spacing:3px;color:var(--ink-faint);
  background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.22s;
}
.dharma-tab:hover{color:var(--gold);}
.dharma-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.dharma-source { font-family:'Noto Sans TC',sans-serif;font-size:11px;letter-spacing:2px;color:var(--gold);margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap; }
.dharma-link { display:inline-flex;align-items:center;gap:4px;color:var(--gold);text-decoration:none;font-size:10px;letter-spacing:2px;border:1px solid rgba(184,149,42,0.38);padding:3px 10px;border-radius:1px;transition:all 0.2s; }
.dharma-link:hover{background:var(--gold);color:var(--rice);}
.dharma-text { font-size:22px;line-height:2.5;letter-spacing:0.08em;color:var(--ink);border-left:3px solid var(--gold);padding-left:22px;margin-bottom:24px; }
.dharma-reflection { font-family:'Noto Sans TC',sans-serif;font-size:13px;line-height:2.1;color:var(--ink-faint);padding:18px 22px;background:var(--gold-pale);border-radius:1px; }
.dharma-reflection strong { display:block;font-size:10px;letter-spacing:2px;color:var(--ink-light);margin-bottom:8px; }
.more-links { margin-top:16px;display:flex;gap:10px;flex-wrap:wrap; }
.more-link { display:inline-flex;align-items:center;gap:4px;color:var(--ink-faint);text-decoration:none;font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:1px;border:1px solid rgba(107,93,80,0.2);padding:4px 11px;border-radius:1px;transition:all 0.2s; }
.more-link:hover{color:var(--ink);border-color:var(--gold);background:var(--gold-pale);}
.history-empty { text-align:center;padding:44px 20px;font-family:'Noto Sans TC',sans-serif;font-size:13px;color:var(--ink-faint);line-height:2; }
.history-item { display:grid;grid-template-columns:130px 1fr 20px;align-items:start;gap:16px;padding:16px 0;border-bottom:1px solid rgba(184,149,42,0.09);cursor:pointer;transition:all 0.18s; }
.history-item:last-child{border-bottom:none;}
.history-item:hover{background:var(--gold-pale);margin:0 -30px;padding-left:30px;padding-right:30px;}
.history-date { font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:2px;color:var(--ink-faint);padding-top:3px;white-space:nowrap; }
.today-badge { display:inline-block;font-size:9px;letter-spacing:1px;background:var(--gold);color:var(--rice);padding:1px 7px;border-radius:1px;margin-left:5px; }
.history-source { font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:1px;color:var(--gold);margin-bottom:5px; }
.history-quote { font-size:15px;line-height:1.9;color:var(--ink-light);letter-spacing:0.04em; }
.history-arrow { color:rgba(184,149,42,0.35);font-size:14px;align-self:center; }
.history-item:hover .history-arrow{color:var(--gold);}
.detail-back { display:inline-flex;align-items:center;gap:8px;font-family:'Noto Sans TC',sans-serif;font-size:11px;letter-spacing:2px;color:var(--ink-faint);cursor:pointer;margin-bottom:22px;padding:6px 0;border:none;background:none;transition:color 0.2s; }
.detail-back:hover{color:var(--gold);}
.detail-date-label { font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:3px;color:var(--ink-faint);margin-bottom:18px; }

/* ── ESSAYS ── */
.section-toolbar { display:flex;justify-content:flex-end;margin-bottom:24px; }
.essay-list { display:flex;flex-direction:column;gap:16px; }
.essay-card { background:var(--mist);border:1px solid var(--border);border-radius:2px;padding:24px 28px;box-shadow:0 2px 14px var(--shadow);cursor:pointer;transition:all 0.22s; }
.essay-card:hover { border-color:rgba(184,149,42,0.4);box-shadow:0 4px 24px rgba(26,22,18,0.13);transform:translateY(-1px); }
.essay-card-meta { display:flex;align-items:center;gap:14px;margin-bottom:10px; }
.essay-date { font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:3px;color:var(--gold); }
.essay-tag { font-family:'Noto Sans TC',sans-serif;font-size:9px;letter-spacing:2px;background:var(--gold-pale);color:var(--gold);padding:2px 9px;border-radius:1px; }
.essay-title { font-size:17px;font-weight:500;letter-spacing:2px;color:var(--ink);margin-bottom:10px;line-height:1.7; }
.essay-excerpt { font-family:'Noto Sans TC',sans-serif;font-size:12px;line-height:2;color:var(--ink-faint);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden; }
.essay-card-footer { display:flex;justify-content:space-between;align-items:center;margin-top:14px; }
.essay-read-more { font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:2px;color:var(--gold); }
.essay-actions { display:flex;gap:8px; }
.essay-detail-back { display:inline-flex;align-items:center;gap:8px;font-family:'Noto Sans TC',sans-serif;font-size:11px;letter-spacing:2px;color:var(--ink-faint);cursor:pointer;margin-bottom:24px;background:none;border:none;transition:color 0.2s; }
.essay-detail-back:hover{color:var(--gold);}
.essay-detail-date { font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:3px;color:var(--gold);margin-bottom:12px; }
.essay-detail-title { font-size:24px;font-weight:400;letter-spacing:4px;color:var(--ink);margin-bottom:8px;line-height:1.7; }
.essay-detail-divider { height:1px;background:linear-gradient(to right,var(--gold),transparent);margin:20px 0;width:120px; }
.essay-detail-body { font-family:'Noto Serif TC',serif;font-size:15px;line-height:2.4;color:var(--ink-light);white-space:pre-wrap; }
.empty-state { text-align:center;padding:60px 20px;font-family:'Noto Sans TC',sans-serif;font-size:13px;color:var(--ink-faint);line-height:2.2; }
.empty-icon { font-size:32px;margin-bottom:16px; }

/* ── GALLERY ── */
.gallery-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:16px; }
.gallery-item { background:var(--mist);border:1px solid var(--border);border-radius:2px;overflow:hidden;cursor:pointer;transition:all 0.25s;box-shadow:0 2px 12px var(--shadow); }
.gallery-item:hover { border-color:rgba(184,149,42,0.4);transform:translateY(-3px);box-shadow:0 8px 28px rgba(26,22,18,0.15); }
.gallery-img-wrap { width:100%;aspect-ratio:4/3;overflow:hidden;background:var(--rice-deep);display:flex;align-items:center;justify-content:center; }
.gallery-img-wrap img { width:100%;height:100%;object-fit:cover;transition:transform 0.4s; }
.gallery-item:hover .gallery-img-wrap img{transform:scale(1.04);}
.gallery-info { padding:14px 16px; }
.gallery-item-title { font-size:13px;font-weight:500;letter-spacing:2px;color:var(--ink);margin-bottom:5px; }
.gallery-item-caption { font-family:'Noto Sans TC',sans-serif;font-size:11px;line-height:1.8;color:var(--ink-faint); }
.gallery-admin-btns { margin-top:10px;display:flex;gap:8px; }

/* ── MODAL ── */
.modal-overlay { display:none;position:fixed;inset:0;background:rgba(26,22,18,0.55);z-index:200;align-items:center;justify-content:center;padding:24px; }
.modal-overlay.open{display:flex;}
.modal { background:var(--rice);border:1px solid var(--border);border-radius:2px;width:100%;max-width:720px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(26,22,18,0.3);animation:modalIn 0.3s ease forwards; }
.modal-header { display:flex;align-items:center;justify-content:space-between;padding:20px 28px;border-bottom:1px solid var(--border); }
.modal-title { font-family:'Noto Sans TC',sans-serif;font-size:11px;letter-spacing:4px;color:var(--gold); }
.modal-close { background:none;border:none;cursor:pointer;font-size:18px;color:var(--ink-faint);transition:color 0.2s; }
.modal-close:hover{color:var(--ink);}
.modal-body { padding:28px; }
.modal-footer { display:flex;justify-content:flex-end;gap:12px;padding:16px 28px 24px; }
.form-group { margin-bottom:20px; }
.form-label { display:block;font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:3px;color:var(--gold);margin-bottom:8px; }
.form-input { width:100%;padding:10px 14px;background:rgba(255,255,255,0.6);border:1px solid var(--border);border-radius:1px;font-family:'Noto Serif TC',serif;font-size:14px;color:var(--ink);outline:none;transition:border-color 0.2s; }
.form-input:focus{border-color:rgba(184,149,42,0.6);}
.form-textarea { width:100%;min-height:280px;padding:14px;background:rgba(255,255,255,0.6);border:1px solid var(--border);border-radius:1px;font-family:'Noto Serif TC',serif;font-size:14px;line-height:2;color:var(--ink);outline:none;resize:vertical;transition:border-color 0.2s; }
.form-textarea:focus{border-color:rgba(184,149,42,0.6);}

/* Login modal */
.login-modal { max-width:400px; }
.login-error { color:var(--verm);font-family:'Noto Sans TC',sans-serif;font-size:12px;margin-top:8px;display:none; }

/* Gallery upload */
.gallery-upload-area { border:1.5px dashed rgba(184,149,42,0.35);border-radius:2px;padding:48px 20px;text-align:center;cursor:pointer;transition:all 0.22s;background:rgba(255,255,255,0.25); }
.gallery-upload-area:hover{border-color:var(--gold);background:var(--gold-pale);}
.upload-icon{font-size:28px;margin-bottom:12px;}
.upload-text{font-family:'Noto Sans TC',sans-serif;font-size:12px;letter-spacing:2px;color:var(--ink-faint);line-height:2;}
.gallery-modal-img{width:100%;max-height:220px;object-fit:contain;background:var(--rice-deep);margin-bottom:16px;border-radius:1px;}

/* ── LIGHTBOX ── */
.lightbox { display:none;position:fixed;inset:0;background:rgba(15,12,10,0.88);z-index:300;align-items:center;justify-content:center;padding:24px;flex-direction:column;gap:16px; }
.lightbox.open{display:flex;}
.lightbox img{max-width:100%;max-height:70vh;object-fit:contain;border:1px solid var(--border);}
.lightbox-info{text-align:center;}
.lightbox-title{font-size:16px;letter-spacing:3px;color:var(--rice);margin-bottom:6px;}
.lightbox-caption{font-family:'Noto Sans TC',sans-serif;font-size:12px;color:rgba(244,239,230,0.6);}
.lightbox-close{position:absolute;top:24px;right:28px;background:none;border:none;cursor:pointer;color:rgba(244,239,230,0.5);font-size:24px;transition:color 0.2s;}
.lightbox-close:hover{color:var(--gold);}

/* ── LOADING ── */
.loading-spinner { text-align:center;padding:48px;font-family:'Noto Sans TC',sans-serif;font-size:12px;letter-spacing:2px;color:var(--ink-faint); }
.spinner { width:24px;height:24px;border:2px solid rgba(184,149,42,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px; }

/* ── FOOTER ── */
.site-footer { text-align:center;padding:32px;font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:3px;color:var(--ink-faint);opacity:0.45;border-top:1px solid var(--border);margin-top:40px; }

@keyframes fadeDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes modalIn{from{opacity:0;transform:scale(0.97)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:700px){
  .site-header{padding:0 20px;}
  .site-logo-sub{display:none;}
  .nav-btn{padding:8px 12px;font-size:10px;letter-spacing:2px;}
  .content-wrap{padding:0 16px 60px;}
  .gallery-grid{grid-template-columns:repeat(2,1fr);}
  .dharma-text{font-size:18px;}
  .history-item{grid-template-columns:100px 1fr 16px;gap:10px;}
}
@media(max-width:480px){
  .gallery-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header class="site-header">
  <div class="site-logo">
    <span class="site-logo-main">佛法足跡</span>
    <span class="site-logo-sub">Buddhist Footprints</span>
  </div>
  <nav class="site-nav">
    <button class="nav-btn active" onclick="showPage('dharma',this)">每日佛典</button>
    <button class="nav-btn" onclick="showPage('essays',this)">佛法心得</button>
    <button class="nav-btn" onclick="showPage('gallery',this)">佛法圖集</button>
    <button class="admin-nav-btn" id="adminNavBtn" onclick="handleAdminClick()">管理員</button>
  </nav>
</header>

<!-- ══ PAGE: 每日佛典 ══ -->
<div class="page active" id="page-dharma">
  <div class="page-hero">
    <div class="page-hero-en">DAILY DHARMA</div>
    <div class="page-hero-title">每日佛典</div>
    <div class="page-hero-desc">大乘漢傳 · 禪宗語錄 · 每日一篇</div>
    <div class="ornament"><span>☸</span></div>
  </div>
  <div class="content-wrap">
    <div class="dharma-tabs">
      <button class="dharma-tab active" id="dtab-today" onclick="switchDharmaTab('today')">今日主題</button>
      <button class="dharma-tab" id="dtab-history" onclick="switchDharmaTab('history')">過往主題</button>
    </div>
    <div class="card" id="dharma-today-card" style="animation-delay:0.15s">
      <div class="card-header"><span style="font-size:19px">🪷</span><div class="card-label">TODAY · 今日佛典</div></div>
      <div class="card-body" id="dharmaBody"></div>
    </div>
    <div id="dharma-history-wrap" style="display:none">
      <div class="card" style="animation-delay:0.15s">
        <div class="card-header"><span style="font-size:19px">📜</span><div class="card-label">ARCHIVE · 過往主題</div></div>
        <div class="card-body" id="historyBody"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══ PAGE: 佛法心得 ══ -->
<div class="page" id="page-essays">
  <div class="page-hero">
    <div class="page-hero-en">DHARMA REFLECTIONS</div>
    <div class="page-hero-title">佛法心得</div>
    <div class="page-hero-desc">記錄修行路上的所思所感</div>
    <div class="ornament"><span>✦</span></div>
  </div>
  <div class="content-wrap">
    <div id="essayAdminToolbar" style="display:none" class="section-toolbar">
      <button class="btn-primary" onclick="openEssayEditor()">＋ 新增心得</button>
    </div>
    <div id="essayListWrap"></div>
    <div id="essayDetailWrap" style="display:none"></div>
  </div>
</div>

<!-- ══ PAGE: 佛法圖集 ══ -->
<div class="page" id="page-gallery">
  <div class="page-hero">
    <div class="page-hero-en">DHARMA GALLERY</div>
    <div class="page-hero-title">佛法圖集</div>
    <div class="page-hero-desc">以圖象，詮釋法義</div>
    <div class="ornament"><span>◈</span></div>
  </div>
  <div class="content-wrap">
    <div id="galleryAdminToolbar" style="display:none" class="section-toolbar">
      <button class="btn-primary" onclick="openGalleryUpload()">＋ 上傳圖片</button>
    </div>
    <div class="gallery-grid" id="galleryGrid"></div>
  </div>
</div>

<footer class="site-footer">日日是好日 · 念念不離當下</footer>

<!-- ══ LOGIN MODAL ══ -->
<div class="modal-overlay" id="loginModal">

      <div class="modal-title">ADMIN · 管理員登入</div>
      <button class="modal-close" onclick="closeModal('loginModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">

<!-- ══ ESSAY EDITOR MODAL ══ -->
<div class="modal-overlay" id="essayModal">

    <div class="modal-header">

    <div class="modal-footer">
      <button class="btn-outline" onclick="closeModal('essayModal')">取消</button>

<!-- ══ GALLERY UPLOAD MODAL ══ -->

function todayKey() {
  return new Date().toLocaleDateString('sv-SE', {timeZone:'Asia/Kuala_Lumpur'});
}
function formatDate(iso) {
  const [y,m,d] = iso.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString('zh-Hant-TW', {year:'numeric',month:'long',day:'numeric',weekday:'long'});
}
function getDharmaByDate(iso) {
  const d = new Date(iso);
  const start = new Date(d.getFullYear(),0,0);
  const day = Math.floor((d - start) / 86400000);
  return dharmaPool[day % dharmaPool.length];
}

function renderDharmaEntry(d, dateLbl) {
  const alts = d.altLinks.map(l =>
    `<a class="more-link" href="${l.url}" target="_blank" rel="noopener">↗ ${l.label}</a>`
  ).join('');
  return `
    ${dateLbl ? `<div class="detail-date-label">${dateLbl}</div>` : ''}
    <div class="dharma-source">
      <span>出處：${d.source}</span>
      <a class="dharma-link" href="${d.cbetaUrl}" target="_blank" rel="noopener">☸ ${d.cbetaLabel}</a>
    </div>
    <div class="dharma-text">${d.text}</div>
    <div class="dharma-reflection"><strong>今日思索 · REFLECTION</strong>${d.reflection}</div>
    <div class="more-links">${alts}</div>`;
}

// Dharma history via localStorage (personal reading log)
function recordToday() {
  const key = todayKey();
  const hist = JSON.parse(localStorage.getItem('dharma-history') || '{}');
  if (!hist[key]) {
    const d = getDharmaByDate(key);
    hist[key] = {date:key, source:d.source, text:d.text};
    localStorage.setItem('dharma-history', JSON.stringify(hist));
  }
}

function switchDharmaTab(tab) {
  document.getElementById('dtab-today').classList.toggle('active', tab==='today');
  document.getElementById('dtab-history').classList.toggle('active', tab==='history');
  document.getElementById('dharma-today-card').style.display = tab==='today' ? 'block' : 'none';
  document.getElementById('dharma-history-wrap').style.display = tab==='history' ? 'block' : 'none';
  if (tab === 'history') renderDharmaHistory();
}

function renderDharmaHistory() {
  const hist = JSON.parse(localStorage.getItem('dharma-history') || '{}');
  const keys = Object.keys(hist).sort((a,b) => b.localeCompare(a));
  const todayK = todayKey();
  const body = document.getElementById('historyBody');
  if (!keys.length) {
    body.innerHTML = `<div class="history-empty">尚無過往紀錄。<br>每日開啟此頁面，今日主題將自動記錄於此。</div>`;
    return;
  }
  body.innerHTML = keys.map(k => {
    const e = hist[k]; const isT = k === todayK;
    return `<div class="history-item" onclick="showDharmaDetail('${k}')">
      <div class="history-date">${formatDate(k)}${isT?'<span class="today-badge">今日</span>':''}</div>
      <div><div class="history-source">${e.source}</div><div class="history-quote">${e.text}</div></div>
      <div class="history-arrow">›</div></div>`;
  }).join('');
}

function showDharmaDetail(iso) {
  const d = getDharmaByDate(iso);
  document.getElementById('historyBody').innerHTML =
    `<button class="detail-back" onclick="renderDharmaHistory()">‹ 返回過往主題</button>
     ${renderDharmaEntry(d, formatDate(iso))}`;
}

// Init dharma
document.getElementById('dharmaBody').innerHTML = renderDharmaEntry(getDharmaByDate(todayKey()), null);
recordToday();

async function renderEssayList() {
  document.getElementById('essayListWrap').style.display = 'block';
  document.getElementById('essayDetailWrap').style.display = 'none';
  const wrap = document.getElementById('essayListWrap');
  wrap.innerHTML = `<div class="loading-spinner"><div class="spinner"></div>載入中…</div>`;

  const { data: essays, error } = await anonDb
    .from('essays')
    .select('*')
    .order('created_at', {ascending: false});

  if (error || !essays) {
    wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠</div>載入失敗，請重新整理頁面。</div>`;
    return;
  }
  if (!essays.length) {
    wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">📝</div>尚未發表任何心得。<br>${isAdmin ? '點擊右上角「新增心得」，記錄你的修行體悟。' : '敬請期待。'}</div>`;
    return;
  }

  wrap.innerHTML = `<div class="essay-list">${essays.map(e => {
    const excerpt = e.content.length > 120 ? e.content.slice(0,120) + '…' : e.content;
    const dateStr = new Date(e.created_at).toLocaleDateString('zh-Hant-TW', {year:'numeric',month:'long',day:'numeric',timeZone:'Asia/Kuala_Lumpur'});
    const adminBtns = isAdmin ? `
      <div class="essay-actions">
        <button class="btn-outline btn-sm" onclick="event.stopPropagation();editEssay('${e.id}')">編輯</button>
        <button class="btn-outline btn-sm btn-danger" onclick="event.stopPropagation();deleteEssay('${e.id}')">刪除</button>
      </div>` : '';
    return `<div class="essay-card" onclick="showEssayDetail('${e.id}')">
      <div class="essay-card-meta">
        <span class="essay-date">${dateStr}</span>
        ${e.tag ? `<span class="essay-tag">${e.tag}</span>` : ''}
      </div>
      <div class="essay-title">${e.title}</div>
      <div class="essay-excerpt">${excerpt.replace(/\n/g,' ')}</div>
      <div class="essay-card-footer">
        <span class="essay-read-more">閱讀全文 →</span>
        ${adminBtns}
      </div>
    </div>`;
  }).join('')}</div>`;
}

async function showEssayDetail(id) {
  const { data: e } = await anonDb.from('essays').select('*').eq('id', id).single();
  if (!e) return;
  document.getElementById('essayListWrap').style.display = 'none';
  const dw = document.getElementById('essayDetailWrap');
  dw.style.display = 'block';
  const dateStr = new Date(e.created_at).toLocaleDateString('zh-Hant-TW', {year:'numeric',month:'long',day:'numeric',timeZone:'Asia/Kuala_Lumpur'});
  const adminBtns = isAdmin ? `
    <div style="margin-top:28px;display:flex;gap:12px">
      <button class="btn-outline btn-sm" onclick="editEssay('${e.id}')">編輯</button>
      <button class="btn-outline btn-sm btn-danger" onclick="deleteEssay('${e.id}')">刪除</button>
    </div>` : '';
  dw.innerHTML = `
    <button class="essay-detail-back" onclick="renderEssayList()">‹ 返回心得列表</button>
    <div class="card">
      <div class="card-body">
        <div class="essay-detail-date">${dateStr}${e.tag ? ' · ' + e.tag : ''}</div>
        <div class="essay-detail-title">${e.title}</div>
        <div class="essay-detail-divider"></div>
        <div class="essay-detail-body">${escHtml(e.content)}</div>
        ${adminBtns}
      </div>
    </div>`;
}

function openEssayEditor(essay) {
  document.getElementById('essayEditId').value = essay ? essay.id : '';
  document.getElementById('essayModalTitle').textContent = essay ? 'EDIT · 編輯心得' : 'NEW ESSAY · 新增心得';
  document.getElementById('essayTitleInput').value = essay ? essay.title : '';
  document.getElementById('essayTagInput').value = essay ? (essay.tag || '') : '';
  document.getElementById('essayContentInput').value = essay ? essay.content : '';
  openModal('essayModal');
}

async function saveEssay() {
  if (!isAdmin) return;
  const id = document.getElementById('essayEditId').value;
  const title = document.getElementById('essayTitleInput').value.trim();
  const tag = document.getElementById('essayTagInput').value.trim();
  const content = document.getElementById('essayContentInput').value.trim();
  if (!title || !content) { alert('請填寫標題和內文。'); return; }

  if (id) {
    await anonDb.from('essays').update({title, tag, content}).eq('id', id);
  } else {
    await anonDb.from('essays').insert({title, tag, content});
  }
  closeModal('essayModal');
  renderEssayList();
}

async function editEssay(id) {
  const { data: e } = await anonDb.from('essays').select('*').eq('id', id).single();
  openEssayEditor(e);
}

async function deleteEssay(id) {
  if (!confirm('確定刪除這篇心得？')) return;
  await anonDb.from('essays').delete().eq('id', id);
  renderEssayList();
}

// ════════════════════════════════════════
// ③ GALLERY (Supabase)
// ════════════════════════════════════════
let pendingImageData = null;

async function renderGallery() {
  const grid = document.getElementById('galleryGrid');
  grid.innerHTML = `<div class="loading-spinner" style="grid-column:1/-1"><div class="spinner"></div>載入中…</div>`;

  const { data: items } = await anonDb
    .from('gallery')
    .select('*')
    .order('created_at', {ascending: false});

  if (!items || !items.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">🖼</div>
      尚未上傳任何圖片。<br>${isAdmin ? '點擊右上角「上傳圖片」開始建立你的佛法圖集。' : '敬請期待。'}
    </div>`;
    return;
  }

  grid.innerHTML = items.map(it => {
    const adminBtns = isAdmin ? `
      <div class="gallery-admin-btns">
        <button class="btn-outline btn-sm" onclick="event.stopPropagation();editGalleryItem('${it.id}')">編輯</button>
        <button class="btn-outline btn-sm btn-danger" onclick="event.stopPropagation();deleteGalleryItem('${it.id}')">刪除</button>
      </div>` : '';
    return `<div class="gallery-item">
      <div class="gallery-img-wrap" onclick="openLightbox('${it.id}','${escAttr(it.image_url)}','${escAttr(it.title)}','${escAttr(it.caption||'')}')">
        <img src="${it.image_url}" alt="${it.title}" loading="lazy">
      </div>
      <div class="gallery-info">
        <div class="gallery-item-title">${it.title}</div>
        ${it.caption ? `<div class="gallery-item-caption">${it.caption}</div>` : ''}
        ${adminBtns}
      </div>
    </div>`;
  }).join('');
}

function openGalleryUpload(item) {
  pendingImageData = item ? item.image_url : null;
  document.getElementById('galleryEditId').value = item ? item.id : '';
  document.getElementById('galleryTitleInput').value = item ? item.title : '';
  document.getElementById('galleryCaptionInput').value = item ? (item.caption || '') : '';
  const prev = document.getElementById('galleryPreviewWrap');
  const trigger = document.getElementById('uploadTrigger');
  if (item) {
    document.getElementById('galleryPreviewImg').src = item.image_url;
    prev.style.display = 'block'; trigger.style.display = 'none';
  } else {
    prev.style.display = 'none'; trigger.style.display = 'block';
  }
  document.getElementById('galleryFileInput').value = '';
  openModal('galleryModal');
}

function handleImageSelect(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    pendingImageData = ev.target.result;
    document.getElementById('galleryPreviewImg').src = pendingImageData;
    document.getElementById('galleryPreviewWrap').style.display = 'block';
    document.getElementById('uploadTrigger').style.display = 'none';
    if (!document.getElementById('galleryTitleInput').value) {
      document.getElementById('galleryTitleInput').value = file.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
    }
  };
  reader.readAsDataURL(file);
}

async function saveGalleryItem() {
  if (!isAdmin) return;
  const id = document.getElementById('galleryEditId').value;
  const title = document.getElementById('galleryTitleInput').value.trim();
  const caption = document.getElementById('galleryCaptionInput').value.trim();
  if (!title) { alert('請填寫圖片標題。'); return; }
  if (!pendingImageData) { alert('請選擇圖片。'); return; }

  if (id) {
    await anonDb.from('gallery').update({title, caption, image_url: pendingImageData}).eq('id', id);
  } else {
    await anonDb.from('gallery').insert({title, caption, image_url: pendingImageData});
  }
  closeModal('galleryModal');
  pendingImageData = null;
  renderGallery();
}

async function editGalleryItem(id) {
  const { data: it } = await anonDb.from('gallery').select('*').eq('id', id).single();
  openGalleryUpload(it);
}

async function deleteGalleryItem(id) {
  if (!confirm('確定刪除此圖片？')) return;
  await anonDb.from('gallery').delete().eq('id', id);
  renderGallery();
}

function openLightbox(id, src, title, caption) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxTitle').textContent = title;
  document.getElementById('lightboxCaption').textContent = caption;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
document.getElementById('lightbox').addEventListener('click', function(e) { if(e.target===this) closeLightbox(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') { closeLightbox(); } });

// Helpers
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return (s||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }
</script>
